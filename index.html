<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>World Clock - Dana K</title>
</head>
<body>
    <div class="container">
    <h1>World Clocks</h1>

    <select name="countries" id="countries">
        <option value="">Select a city..</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">South Korea</option>
    </select>

    <div class="city">
        <div>
        <h2>New York 🇺🇸</h2>
        <div class="date">January 15th 2026</div>
        </div>
        <div class="time">9:44:21 <small>AM</small></div>
    </div>
    <div class="city">
        <div>
        <h2>South Korea 🇰🇷</h2>
        <div class="date">January 15th 2026</div>
        </div>
        <div class="time">9:44:21 <small>AM</small></div>
    </div>
    </div>
    <footer>This project was coded with ❤️ by <strong> <a href="https://github.com/revelation4825-tech" target="_blank">Dana K</a></strong> and is <a href="https://github.com/revelation4825-tech/world-clock-5" target="_blank">open sourced on GitHub</a>.</footer>
</body>
<script src="app.js"></script>
</html>
