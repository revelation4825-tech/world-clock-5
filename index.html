<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <title>World Clock - Dana K</title>
</head>
<body>
    <div class="container">
    <h1>World Clocks</h1>

    <select id="city">
        <option value="">Select a city..</option>
        <option value="current">My current location</option>
        <option value="America/Los_Angeles 🇺🇸">Los Angeles</option>
        <option value="Europe/London 🇬🇧">London</option>
        <option value="Asia/Seoul 🇰🇷">Seoul</option>
    </select>

    <div id="cities">
    <div class="city" id="new-york">
        <div>
        <h2>New York 🇺🇸</h2>
        <div class="date"></div>
        </div>
        <div class="time"> <small></small></div>
    </div>
    <div class="city" id="seoul">
        <div>
        <h2>Seoul 🇰🇷</h2>
        <div class="date"></div>
        </div>
        <div class="time"> <small></small></div>
    </div>
    </div>
    </div>
    <footer>This project was coded with ❤️ by <strong> <a href="https://github.com/revelation4825-tech" target="_blank">Dana K</a></strong> and is <a href="https://github.com/revelation4825-tech/world-clock-5" target="_blank">open sourced on GitHub</a>.</footer>
</body>
<script src="app.js"></script>
</html>
